<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollito & Pengui Adventure</title>
<style>
body{margin:0;overflow:hidden;background:#87CEEB;}
canvas{display:block;}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ---------- BASIC VARIABLES ---------- */

let gravity=0.6
let cameraX=0
let score=0
let step=0
let gameState="title"
let worldWidth=5000

/* ---------- AUDIO ---------- */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function playTone(freq,dur){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.type="square"

osc.start()

gain.gain.setValueAtTime(0.2,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur)

osc.stop(audioCtx.currentTime+dur)

}

/* ---------- PLAYER ---------- */

let player={
x:200,
y:300,
vx:0,
vy:0,
facing:1,
speed:5,
star:false
}

let jumping=false
let footprints=[]

/* ---------- WORLD ---------- */

let ground=canvas.height-80

let platforms=[
{x:400,y:300,type:"normal"},
{x:800,y:260,type:"normal"},
{x:1200,y:300,type:"ice"},
{x:1600,y:280,type:"normal"},
{x:2000,y:250,type:"normal"}
]

let mysteryBlocks=[
{x:900,y:200,hit:false}
]

let hearts=[]
let greenHearts=[]

let penguin={x:2300,y:ground-40,react:false}
let jeep={x:0,y:ground-20,active:false}

let houseX=4200

let tinyChicks=[]

/* ---------- RESET ---------- */

function resetGame(){

score=0
cameraX=0
player.x=200
player.y=300
player.vx=0
player.vy=0
player.star=false

hearts=[]
for(let i=0;i<10;i++){
hearts.push({x:450+i*200,y:260,collected:false})
}

greenHearts=[]
for(let i=0;i<20;i++){
greenHearts.push({x:2500+i*120,y:260,collected:false})
}

}

resetGame()

/* ---------- DRAW FUNCTIONS ---------- */

function drawChick(x,y){

ctx.fillStyle=player.star?"gold":"yellow"

ctx.beginPath()
ctx.ellipse(x+20,y+32,18,22,0,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(x+20,y+12,14,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="orange"

ctx.beginPath()
ctx.moveTo(x+32,y+12)
ctx.lineTo(x+46,y+16)
ctx.lineTo(x+32,y+20)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x+24,y+10,3,0,Math.PI*2)
ctx.fill()

let foot=Math.sin(step)*4

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(x+12,y+52+foot,4,0,Math.PI*2)
ctx.arc(x+28,y+52-foot,4,0,Math.PI*2)
ctx.fill()

}

function drawPenguin(x,y){

ctx.fillStyle="black"
ctx.beginPath()
ctx.ellipse(x+20,y+34,20,26,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.ellipse(x+20,y+36,12,16,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x+20,y+12,14,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="orange"
ctx.beginPath()
ctx.moveTo(x+20,y+14)
ctx.lineTo(x+28,y+18)
ctx.lineTo(x+20,y+22)
ctx.lineTo(x+12,y+18)
ctx.fill()

}

/* ---------- UPDATE ---------- */

function update(){

if(player.vx!==0){
step+=0.3
footprints.push({x:player.x+20,life:60})
if(Math.floor(step*10)%8===0) playTone(600,0.05)
}

footprints.forEach(f=>f.life--)
footprints=footprints.filter(f=>f.life>0)

player.vy+=gravity
player.x+=player.vx
player.y+=player.vy
player.vx*=0.8

if(player.y>ground-40){
player.y=ground-40
player.vy=0
}

if(jumping) player.vy-=0.3

if(player.x<0) player.x=0
if(player.x>worldWidth) player.x=worldWidth

/* platform collision */

platforms.forEach(p=>{
if(player.x+40>p.x &&
player.x<p.x+120 &&
player.y+40>p.y &&
player.y+40<p.y+20 &&
player.vy>=0){

player.y=p.y-40
player.vy=0

if(p.type==="ice"){
player.vx*=1.2
}

}
})

/* hearts */

hearts.forEach(h=>{
let dx=player.x-h.x
let dy=player.y-h.y
let d=Math.sqrt(dx*dx+dy*dy)

if(d<35 && !h.collected){
h.collected=true
score++
playTone(900,0.1)
}
})

/* mystery block */

mysteryBlocks.forEach(b=>{
if(!b.hit &&
player.x>b.x-20 &&
player.x<b.x+40 &&
player.y<b.y+20 &&
player.vy<0){

b.hit=true
hearts.push({x:b.x,y:b.y-40,collected:false})

}
})

/* penguin reaction */

if(Math.abs(player.x-penguin.x)<200){
penguin.react=true
penguin.y=ground-50+Math.sin(Date.now()*0.01)*5
}

/* jeep trigger */

if(score>=10 && player.x>penguin.x){

jeep.active=true
jeep.x=player.x
gameState="jeep"

}

/* jeep mode */

if(gameState==="jeep"){

jeep.x+=4
cameraX=jeep.x-canvas.width/3

greenHearts.forEach(h=>{
if(!h.collected && Math.abs(jeep.x-h.x)<40){
h.collected=true
playTone(700,0.1)
}
})

if(jeep.x>houseX){
gameState="home"

for(let i=0;i<12;i++){
tinyChicks.push({
x:houseX,
y:ground-20,
vx:(Math.random()*6)-3,
vy:-10
})
}

}

}

/* tiny chicks */

tinyChicks.forEach(c=>{
c.vy+=gravity
c.x+=c.vx
c.y+=c.vy

if(c.y>ground-20){
c.y=ground-20
c.vy=-8
}
})

/* camera */

let target=player.x-canvas.width/2
if(target<0) target=0
if(target>worldWidth-canvas.width) target=worldWidth-canvas.width
cameraX+=(target-cameraX)*0.1

}

/* ---------- DRAW ---------- */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* ground */

ctx.fillStyle="#228B22"
ctx.fillRect(0,ground,canvas.width,80)

/* footprints */

footprints.forEach(f=>{
ctx.globalAlpha=f.life/60
ctx.fillStyle="black"
ctx.beginPath()
ctx.ellipse(f.x-cameraX,ground,6,3,0,0,Math.PI*2)
ctx.fill()
ctx.globalAlpha=1
})

/* platforms */

ctx.fillStyle="#8B4513"
platforms.forEach(p=>{
ctx.fillRect(p.x-cameraX,p.y,120,20)
})

/* mystery blocks */

ctx.fillStyle="gold"
mysteryBlocks.forEach(b=>{
ctx.fillRect(b.x-cameraX,b.y,40,40)
})

/* hearts */

ctx.fillStyle="red"
hearts.forEach(h=>{
if(!h.collected){
ctx.beginPath()
ctx.arc(h.x-cameraX,h.y,8,0,Math.PI*2)
ctx.fill()
}
})

/* green hearts jeep section */

ctx.fillStyle="lime"
greenHearts.forEach(h=>{
if(!h.collected){
ctx.beginPath()
ctx.arc(h.x-cameraX,h.y,8,0,Math.PI*2)
ctx.fill()
}
})

/* penguin */

drawPenguin(penguin.x-cameraX,penguin.y)

/* house */

ctx.fillStyle="brown"
ctx.fillRect(houseX-cameraX,ground-80,120,80)
ctx.fillStyle="red"
ctx.fillRect(houseX-cameraX,ground-110,120,40)

/* tiny chicks */

tinyChicks.forEach(c=>{
drawChick(c.x-cameraX,c.y)
})

/* player */

drawChick(player.x-cameraX,player.y)

/* HUD */

ctx.fillStyle="white"
ctx.font="20px sans-serif"
ctx.fillText("Hearts: "+score,20,40)

}

/* ---------- GAME LOOP ---------- */

function loop(){

if(gameState==="play") update()
if(gameState==="jeep") update()
draw()

if(gameState==="title"){

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="40px sans-serif"
ctx.fillText("Pollito ❤️ Pengui",canvas.width/2,200)

ctx.font="22px sans-serif"
ctx.fillText("Tap to start",canvas.width/2,260)

}

requestAnimationFrame(loop)

}

loop()

/* ---------- CONTROLS ---------- */

canvas.addEventListener("touchstart",e=>{

if(gameState==="title"){
gameState="play"
return
}

let x=e.touches[0].clientX
let y=e.touches[0].clientY

if(y<canvas.height/2){
jumping=true
player.vy=-8
}else{
if(x<canvas.width/2) player.vx=-player.speed
else player.vx=player.speed
}

})

canvas.addEventListener("touchend",()=>{
jumping=false
player.vx=0
})

</script>
</body>
</html>
