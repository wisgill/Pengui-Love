<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollito & Pengui</title>
<style>
body{margin:0;overflow:hidden;background:#87CEEB;}
canvas{display:block;}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=0.6;
let cameraX=0;
let score=0;
let step=0;
let gameState="title";
let gameWon=false;

let worldWidth=2200;

/* ---------------- SOUND ---------------- */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,dur){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value=freq;
osc.type="square";

osc.start();

gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);

osc.stop(audioCtx.currentTime+dur);

}

/* ---------------- WORLD ---------------- */

let clouds=[
{x:100,y:100},
{x:400,y:140},
{x:700,y:90},
{x:1100,y:130}
];

let player={
x:200,
y:300,
vx:0,
vy:0,
facing:1
};

let ground=canvas.height-80;
let platformHeight=canvas.height/2;

let platforms=[
{x:400,y:platformHeight},
{x:650,y:platformHeight-40},
{x:900,y:platformHeight+20},
{x:1200,y:platformHeight-30},
{x:1500,y:platformHeight}
];

let hearts=[];
let heartBurst=[];
let heartPopups=[];

let penguin={x:2000,y:ground-40};
let babyPengui=null;

let moveLeft=false;
let moveRight=false;

/* ---------------- RESET ---------------- */

function resetGame(){

score=0;
cameraX=0;
gameWon=false;
babyPengui=null;
heartBurst=[];
heartPopups=[];

player.x=200;
player.y=300;

hearts=[];

for(let i=0;i<10;i++){
hearts.push({
x:420+(i*180),
y:platformHeight-30,
collected:false
});
}

}

resetGame();

/* ---------------- DRAW CHARACTERS ---------------- */

function drawChick(x,y){

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.ellipse(x+20,y+32,18,22,0,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(x+20,y+12,14,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#f5d742";
ctx.beginPath();
ctx.ellipse(x+20,y+32,10,8,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="orange";

if(player.facing===1){
ctx.beginPath();
ctx.moveTo(x+32,y+12);
ctx.lineTo(x+46,y+16);
ctx.lineTo(x+32,y+20);
ctx.fill();
}else{
ctx.beginPath();
ctx.moveTo(x+8,y+12);
ctx.lineTo(x-6,y+16);
ctx.lineTo(x+8,y+20);
ctx.fill();
}

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(player.facing===1?x+24:x+16,y+10,3,0,Math.PI*2);
ctx.fill();

let footOffset=Math.sin(step)*4;

ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(x+12,y+52+footOffset,4,0,Math.PI*2);
ctx.arc(x+28,y+52-footOffset,4,0,Math.PI*2);
ctx.fill();

}

function drawPenguin(x,y,size=1){

let s=size;

ctx.fillStyle="black";
ctx.beginPath();
ctx.ellipse(x+20*s,y+34*s,20*s,26*s,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.ellipse(x+20*s,y+36*s,12*s,16*s,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(x+20*s,y+12*s,14*s,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x+24*s,y+10*s,3*s,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="orange";
ctx.beginPath();
ctx.moveTo(x+20*s,y+14*s);
ctx.lineTo(x+28*s,y+18*s);
ctx.lineTo(x+20*s,y+22*s);
ctx.lineTo(x+12*s,y+18*s);
ctx.fill();

ctx.beginPath();
ctx.arc(x+12*s,y+58*s,4*s,0,Math.PI*2);
ctx.arc(x+28*s,y+58*s,4*s,0,Math.PI*2);
ctx.fill();

}

function drawHeart(x,y){

ctx.fillStyle="red";

ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x-10,y-10,x-20,y+10,x,y+20);
ctx.bezierCurveTo(x+20,y+10,x+10,y-10,x,y);
ctx.fill();

}

function drawCloud(x,y){

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.arc(x+20,y-10,25,0,Math.PI*2);
ctx.arc(x+40,y,20,0,Math.PI*2);
ctx.fill();

}

/* ---------------- UPDATE ---------------- */

function update(){

clouds.forEach(c=>{c.x+=0.2;});

if(moveLeft){
player.vx=-5;
player.facing=-1;
}

if(moveRight){
player.vx=5;
player.facing=1;
}

if(moveLeft||moveRight){

step+=0.3;

if(Math.floor(step*10)%8===0){
playTone(600,0.05);
}

}

player.vy+=gravity;

player.x+=player.vx;
player.y+=player.vy;

player.vx*=0.8;

if(player.y+40>ground){
player.y=ground-40;
player.vy=0;
}

if(player.x<0) player.x=0;
if(player.x>worldWidth) player.x=worldWidth;

platforms.forEach(p=>{
if(player.x+40>p.x &&
player.x<p.x+120 &&
player.y+40>p.y &&
player.y+40<p.y+20 &&
player.vy>=0){
player.y=p.y-40;
player.vy=0;
}
});

hearts.forEach(h=>{

let dx=player.x-h.x;
let dy=player.y-h.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<35 && !h.collected){

h.collected=true;
score++;

playTone(900,0.15);

heartPopups.push({
x:h.x,
y:h.y,
life:40
});

}

});

if(score>=10){

let dx=player.x-penguin.x;
let dy=player.y-penguin.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<40 && !gameWon){

gameWon=true;

playTone(1200,0.4);

babyPengui={
x:penguin.x+40,
y:penguin.y-20,
vx:2,
vy:-10
};

for(let i=0;i<25;i++){
heartBurst.push({
x:penguin.x+20,
y:penguin.y+20,
vx:(Math.random()*6)-3,
vy:(Math.random()*-6),
life:60
});
}

}

}

heartBurst.forEach(h=>{
h.vy+=0.2;
h.x+=h.vx;
h.y+=h.vy;
h.life--;
});

heartBurst=heartBurst.filter(h=>h.life>0);

heartPopups.forEach(p=>{
p.y-=1;
p.life--;
});

heartPopups=heartPopups.filter(p=>p.life>0);

if(babyPengui){

babyPengui.vy+=gravity;

babyPengui.x+=babyPengui.vx;
babyPengui.y+=babyPengui.vy;

if(babyPengui.y>ground-20){
babyPengui.y=ground-20;
babyPengui.vy=-10;
babyPengui.vx=(Math.random()*4)-2;
}

}

let targetCamera=player.x-canvas.width/2;

if(targetCamera<0) targetCamera=0;
if(targetCamera>worldWidth-canvas.width) targetCamera=worldWidth-canvas.width;

cameraX += (targetCamera-cameraX)*0.1;

}

/* ---------------- DRAW ---------------- */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

clouds.forEach(c=>{
drawCloud(c.x-cameraX*0.3,c.y);
});

ctx.fillStyle="#228B22";
ctx.fillRect(0,ground,canvas.width,80);

ctx.fillStyle="#8B4513";

platforms.forEach(p=>{
ctx.fillRect(p.x-cameraX,p.y,120,20);
});

hearts.forEach(h=>{
if(!h.collected){
drawHeart(h.x-cameraX,h.y);
}
});

heartBurst.forEach(h=>{
drawHeart(h.x-cameraX,h.y);
});

heartPopups.forEach(p=>{
ctx.fillStyle="white";
ctx.fillText("+1",p.x-cameraX,p.y);
});

if(score>=10){
drawPenguin(penguin.x-cameraX,penguin.y);
}

if(babyPengui){
drawPenguin(babyPengui.x-cameraX,babyPengui.y,0.6);
}

drawChick(player.x-cameraX,player.y);

ctx.fillStyle="white";
ctx.font="20px sans-serif";
ctx.fillText("Hearts: "+score+"/10",20,40);

if(gameWon){

ctx.font="28px sans-serif";
ctx.textAlign="center";
ctx.fillText("Yay! Baby Pengui time!",canvas.width/2,80);

ctx.font="20px sans-serif";
ctx.fillText("Tap screen to play again",canvas.width/2,120);

ctx.textAlign="left";

}

}

/* ---------------- LOOP ---------------- */

function loop(){

if(gameState==="play"){
update();
draw();
}

if(gameState==="title"){

ctx.fillStyle="#87CEEB";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="40px sans-serif";
ctx.fillText("Pollito ❤️ Pengui",canvas.width/2,200);

ctx.font="24px sans-serif";
ctx.fillText("Collect hearts and find Pengui!",canvas.width/2,260);

ctx.fillText("Tap to start",canvas.width/2,340);

}

requestAnimationFrame(loop);

}

loop();

/* ---------------- CONTROLS ---------------- */

canvas.addEventListener("touchstart",e=>{

if(gameState==="title"){
gameState="play";
return;
}

if(gameWon){
resetGame();
return;
}

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

if(y<canvas.height/2){
player.vy=-12;
}else{
if(x<canvas.width/2) moveLeft=true;
else moveRight=true;
}

});

canvas.addEventListener("touchend",()=>{
moveLeft=false;
moveRight=false;
});

</script>
</body>
</html>
